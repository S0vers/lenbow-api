name: lenbow

services:
  postgres:
    image: postgres:latest
    container_name: lenbow-postgres
    restart: on-failure
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - lenbow_pgdata:/var/lib/postgresql/data

volumes:
  lenbow_pgdata:
